# ============================================================
# 示例：柑橘实蝇检测研究 - 科研工作内容（完整配置示例）
# 
# 本示例展示了所有可用配置字段的完整用法
# 实际使用时请复制 research_context.yaml 模板并填写你的内容
# ============================================================

# ----------------------------------------------------------------
# 论文标题
# ----------------------------------------------------------------
title: "基于序列图像融合的实蝇侵染柑橘无损检测方法研究"

# ----------------------------------------------------------------
# 章节名称配置（必需）
# 
# 可根据实际研究内容自定义章节名称
# ----------------------------------------------------------------
chapters:
  write_chapter1: "1 绪论"
  write_chapter2: "2 柑橘多视角图像采集与数据处理"
  write_chapter3: "3 基于多视角注意力融合的检测模型构建"
  write_chapter4: "4 实验结果与对比分析"
  write_chapter5: "5 柑橘实蝇智能检测与问答系统设计与实现"
  write_chapter6: "6 总结与展望"

# ----------------------------------------------------------------
# 需要代码检索的章节
# 
# 指定哪些章节需要从代码库检索信息
# ----------------------------------------------------------------
code_chapter_keys:
  - write_chapter2
  - write_chapter3
  - write_chapter4
  - write_chapter5

# ----------------------------------------------------------------
# 研究概述
# ----------------------------------------------------------------
research_summary: >
  本研究针对柑橘实蝇侵染无损检测任务，构建了五视角图像采集系统以获取果实表面完整信息。
  确立了以 ConvNeXt-Tiny 为主干网络，结合自注意力机制（Self-Attention）的多视角融合方案，
  有效降低了漏检率。同时，将检测算法与 Qwen 多智能体、FAISS RAG 知识库集成，
  开发了支持跨平台访问的智能检测 Web 应用。

# ----------------------------------------------------------------
# 核心创新点
# ----------------------------------------------------------------
innovations:
  - "提出基于 ConvNeXt-Tiny 与自注意力机制的多视角特征融合模型，有效克服了简单拼接的高维冗余问题与 LSTM 对空间视角关系的破坏，显著提升了细粒度病斑的识别准确率"
  - "针对柑橘病害位置随机的特点，设计了视角级别的自适应权重分配策略，使模型能够动态聚焦包含虫害病灶的关键视角，抑制健康视角与背景噪声"
  - "实现了科研成果的工程化转换，基于 Flask 与原生 Web 技术开发了移动端优先的智能系统，将深度学习模型封装为 AI Skill，并深度集成大模型与 RAG 知识库"

# ----------------------------------------------------------------
# 方法论核心描述
# ----------------------------------------------------------------
methodology:
  # 数据采集方法
  data_collection: >
    设计了涵盖赤道面与极区的五视角图像采集与抽帧方案：将柑橘置于旋转平台上，在稳定光源照射下，
    由侧面摄像头录制环绕视频，顶部摄像头拍摄顶角图像。对环绕视频等间隔抽帧（0°、90°、180°、270°），
    与顶角图像构成五视角图像集。采集完成后，通过切开检验验证样本的真实性，
    构建了比例均衡的数据集（共 254 个样本，其中患病 139 个，健康 115 个）。

  # 模型架构描述
  model_architecture: >
    最佳技术路线（多视角 ConvNeXt-Tiny 自注意力机制融合模型）：
    选用 ConvNeXt-Tiny 作为主干网络，因柑橘病斑属典型细粒度视觉任务，该网络特征提取能力强且参数量小于 ResNet-18，
    能有效避免小数据集过拟合，保证训练稳定。提取五视角特征后，通过自注意力机制进行融合，
    动态计算权重以突出包含虫害病灶的关键视角。

  # 对比模型列表
  comparison_models:
    - name: "单视角 ConvNeXt-Tiny 模型 (Base-line)"
      description: "仅使用单张水平图进行分类，作为评估多视角增益的基准线"
    - name: "多视角简单拼接融合 ConvNeXt-Tiny 模型"
      description: "五张图特征直接拼接后分类，用于验证多视角基础增益，但存在高维冗余问题"
    - name: "多视角 ConvNeXt-Tiny-BiLSTM 融合模型"
      description: "引入 LSTM 处理序列，用于对比测试，但其单向序列假设会破坏空间视角关系"

  # 训练策略
  training_strategy: >
    主干网络统一采用 ConvNeXt-Tiny。为了保证模型性能评估的客观性与稳定性，
    实验采用多种随机种子（如 seed=42 等）进行多次重复训练与测试，并计算平均指标。
    通过严格的对比实验系统评估多视角融合与注意力机制对检测精度的提升效果。

# ----------------------------------------------------------------
# 实验结果
# ----------------------------------------------------------------
experiment_results:
  # 实验环境
  environment: >
    GPU: NVIDIA RTX 5060；
    框架：PyTorch 2.7.1+ (CUDA 12.8)；
    OS: Windows (Anaconda 虚拟环境)
  
  # 关键指标
  key_metrics:
    - metric: "F1-Score"
      our_method: "0.9583 (代表性测试如 seed=42 下的自注意力融合最优模型表现)"
      best_baseline: "多次随机种子平均结果下均低于最优模型"
    - metric: "Accuracy"
      our_method: "0.9487 (代表性测试如 seed=42 下的自注意力融合最优模型表现)"
      best_baseline: "多次随机种子平均结果下均低于最优模型"
  
  # 关键发现
  key_findings:
    - "在多种 seed 平均测试情况下，ConvNeXt-Tiny 多视角融合与自注意力机制始终是最优选择"
    - "在一次代表性测试（seed=42）中，最优模型实现了假阴性为 0（未漏掉任何正样本）"

# ----------------------------------------------------------------
# 系统实现
# ----------------------------------------------------------------
system_implementation:
  # 系统架构
  architecture: >
    后端：Flask 框架；前端：原生 Web 技术（HTML5/CSS3/JS），移动端优先 UI 与动态渐变交互界面；
    部署：依托本地 GPU 离线推理，结合 Ngrok/Cloudflare 内网穿透技术支持多端访问。
  
  # 核心功能
  core_features:
    - "轻量化移动端检测：为兼顾移动端响应速度与便利性，Web 端检测采用了单视角 ConvNeXt-Tiny 模型提供参考级判断"
    - "AI Skill 封装：将深度学习检测模型与图像质量评估算法按 OpenAI 框架格式封装为 Skill"
    - "智能诊断与文献检索：集成 Qwen 多智能体与基于 FAISS 的 RAG 本地知识库，提供专业对话服务"

