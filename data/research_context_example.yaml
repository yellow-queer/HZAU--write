# 研究不足与展望
# ----------------------------------------------------------------
limitations_and_future:
  # 研究不足
  limitations:
    - "当前 Web 系统为了兼顾移动端响应速度与便利性，仅部署了单视角模型作为参考，未完全释放多视角融合的性能潜力"
    - "数据集规模（254 个）仍有扩充空间，以进一步验证模型在不同品种、不同产地柑橘上的鲁棒性"
    - "实验主要在受控实验室环境下进行，实际果园复杂环境下的泛化能力有待验证"
  
  # 未来工作方向
  future_work:
    - "优化多视角采集的工程化方案，争取在 Web 端/移动端实现轻量化的多视角联合推理"
    - "持续扩充本地 RAG 知识库的农技文献规模，提升 Qwen 多智能体在复杂农业场景下的诊断准确性"
    - "采集更多品种、更多产地的柑橘样本，构建更大规模的 datasets"
    - "探索在真实果园环境下的部署方案，提升系统的实用性和鲁棒性"

# ----------------------------------------------------------------
# 用户自定义补充说明
# ----------------------------------------------------------------
additional_notes: |
  请在论文撰写时遵循以下逻辑侧重点：
  1. 强调"切开检验"这一步骤，说明其保证了数据集标签的准确性
  2. 详细论述 Backbone 选择 ConvNeXt-Tiny 的原因（细粒度任务、参数量、训练稳定性）
  3. 明确对比实验的层级关系（基线→简单拼接→LSTM 融合→注意力融合）
  4. 强调结论是基于多种 seed 平均情况得出的客观结果，避免单次测试的偶然性
  5. 在系统实现章节突出工程化转换的价值，强调从科研到应用的完整链条
  6. 注意图表的使用，关键数据应以表格或图形方式直观展示
