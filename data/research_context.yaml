# ============================================================
# AutoPaperGen 科研工作内容配置
# 
# 用于配置论文生成所需的研究背景、创新点、方法论等信息
# ============================================================

# ----------------------------------------------------------------
# 论文标题（可选，如不提供则使用命令行输入的 topic）
# ----------------------------------------------------------------
title: ""

# ----------------------------------------------------------------
# 章节名称配置（必需）
# 
# 定义各章节的显示名称，系统会根据此配置生成论文章节
# 必须包含以下章节键：write_chapter1 到 write_chapter6
# ----------------------------------------------------------------
chapters:
  write_chapter1: "1 绪论"
  write_chapter2: "2 研究方法与数据"
  write_chapter3: "3 模型设计与实现"
  write_chapter4: "4 实验结果与分析"
  write_chapter5: "5 系统开发与应用"
  write_chapter6: "6 总结与展望"

# ----------------------------------------------------------------
# 需要代码检索的章节（可选）
# 
# 指定哪些章节需要从代码库中检索信息以增强内容准确性
# 默认值：["write_chapter2", "write_chapter3", "write_chapter4", "write_chapter5"]
# ----------------------------------------------------------------
# code_chapter_keys:
#   - write_chapter2
#   - write_chapter3
#   - write_chapter4
#   - write_chapter5

# ----------------------------------------------------------------
# 需要内容检索的章节（可选）
# 
# 指定哪些章节需要从内容库（data/content）中检索信息
# 默认值：["write_chapter2", "write_chapter3", "write_chapter4", "write_chapter5"]
# ----------------------------------------------------------------
# content_chapter_keys:
#   - write_chapter2
#   - write_chapter3
#   - write_chapter4
#   - write_chapter5

# ----------------------------------------------------------------
# 研究概述（推荐）
# 
# 简要描述研究的核心内容、方法和主要成果
# ----------------------------------------------------------------
research_summary: ""

# ----------------------------------------------------------------
# 核心创新点（推荐）
# 
# 列出研究的主要创新贡献，每条应简洁明了
# ----------------------------------------------------------------
# innovations:
#   - "创新点 1 描述"
#   - "创新点 2 描述"
#   - "创新点 3 描述"

# ----------------------------------------------------------------
# 方法论核心描述（可选）
# 
# 详细描述研究方法、技术路线、实验设计等
# ----------------------------------------------------------------
# methodology:
#   # 数据采集方法
#   data_collection: ""
#   
#   # 模型架构描述
#   model_architecture: ""
#   
#   # 对比模型列表
#   comparison_models:
#     - name: "模型名称"
#       description: "模型描述"
#   
#   # 训练策略
#   training_strategy: ""

# ----------------------------------------------------------------
# 实验结果（可选）
# 
# 记录关键实验指标和发现
# ----------------------------------------------------------------
# experiment_results:
#   # 实验环境
#   environment: ""
#   
#   # 关键指标
#   key_metrics:
#     - metric: "指标名称"
#       our_method: "本方法结果"
#       best_baseline: "基线方法结果"
#   
#   # 关键发现
#   key_findings:
#     - "发现 1"
#     - "发现 2"

# ----------------------------------------------------------------
# 系统实现（可选，适用于有系统开发的论文）
# ----------------------------------------------------------------
# system_implementation:
#   # 系统架构
#   architecture: ""
#   
#   # 核心功能
#   core_features:
#     - "功能 1"
#     - "功能 2"

# ----------------------------------------------------------------
# 章节写作指引（可选）
# 
# 为特定章节提供自定义的写作提示词，覆盖系统默认提示词
# 适用于需要特殊写作风格或特定内容组织方式的场景
# ----------------------------------------------------------------
# chapter_prompts:
#   write_chapter1: |
#     1.1 研究背景与意义
#     1.2 国内外研究现状
#     1.3 研究内容与创新点
#   
#   write_chapter2: |
#     2.1 数据采集与预处理
#     2.2 实验设计与设置
#     2.3 评估指标
#   
#   write_chapter3: |
#     3.1 整体架构
#     3.2 核心模块设计
#     3.3 实现细节
#   
#   write_chapter4: |
#     4.1 对比实验结果
#     4.2 消融实验
#     4.3 结果分析与讨论
#   
#   write_chapter5: |
#     5.1 系统需求分析
#     5.2 系统设计与实现
#     5.3 系统功能展示
#   
#   write_chapter6: |
#     6.1 研究总结
#     6.2 研究不足
#     6.3 未来展望

# ----------------------------------------------------------------
# 检索查询模板（可选）
# 
# 为特定章节自定义文献检索和代码检索的查询模板
# 适用于需要针对性检索特定主题内容的场景
# ----------------------------------------------------------------
# retrieval_queries:
#   write_chapter1:
#     literature:
#       - "{topic} 研究背景与意义"
#       - "{topic} 国内外研究现状"
#       - "{topic} 综述"
#   
#   write_chapter2:
#     literature:
#       - "{topic} 数据采集方法"
#       - "{topic} 实验设计"
#     code:
#       - "数据预处理实现"
#       - "数据集加载代码"
#   
#   write_chapter3:
#     literature:
#       - "{topic} 模型架构"
#       - "{topic} 核心算法"
#     code:
#       - "模型定义与实现"
#       - "核心算法代码"
#   
#   write_chapter4:
#     literature:
#       - "{topic} 实验结果对比"
#       - "{topic} 性能评估"
#     code:
#       - "实验评估代码"
#       - "结果可视化代码"
#   
#   write_chapter5:
#     literature:
#       - "{topic} 系统实现"
#       - "{topic} 应用部署"
#     code:
#       - "系统架构实现"
#       - "API 接口代码"

# ----------------------------------------------------------------
# 研究不足与展望（可选）
# ----------------------------------------------------------------
# limitations_and_future:
#   # 研究不足
#   limitations:
#     - "不足 1"
#     - "不足 2"
#   
#   # 未来工作方向
#   future_work:
#     - "方向 1"
#     - "方向 2"

# ----------------------------------------------------------------
# 用户自定义补充说明（可选）
# 
# 提供额外的写作要求或注意事项
# ----------------------------------------------------------------
# additional_notes: |
#   请在论文撰写时遵循以下逻辑侧重点：
#   1. 强调某特定步骤或方法
#   2. 详细说明某个设计决策的原因
#   3. 明确对比实验的层级关系
#   4. 其他需要注意的事项
